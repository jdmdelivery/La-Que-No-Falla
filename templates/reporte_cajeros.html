<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporte de ventas por cajero</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 32px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      color: #f8fafc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
    }

    th {
      text-align: left;
      color: #cbd5e1;
      background: #1e293b;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    td:last-child,
    th:last-child {
      text-align: right;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tfoot td {
      background: #020617;
      color: #f8fafc;
      font-weight: 800;
      border-top: 2px solid #475569;
      border-bottom: none;
    }

    .empty {
      padding: 20px;
      color: #94a3b8;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Reporte de ventas por cajero</h1>

    {% if cajeros %}
    <table>
      <thead>
        <tr>
          <th>Cajero</th>
          <th>Total Vendido</th>
        </tr>
      </thead>
      <tbody>
        {% for row in cajeros %}
        <tr>
          <td>{{ row.cajero }}</td>
          <td>RD$ {{ "%.2f"|format((row.total or 0)|float) }}</td>
        </tr>
        {% endfor %}
      </tbody>
      <tfoot>
        <tr>
          <td>TOTAL GENERAL</td>
          <td>RD$ {{ "%.2f"|format((total_general or 0)|float) }}</td>
        </tr>
      </tfoot>
    </table>
    {% else %}
    <div class="empty">No hay ventas cerradas para mostrar.</div>
    {% endif %}
  </main>
</body>
</html>
